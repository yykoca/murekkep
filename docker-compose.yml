services:
  # --- ANGULAR FRONTEND ---
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  # --- SYMFONY BACKEND ---
  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/var/www/symfony
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD:-app_pass}@database:5432/${POSTGRES_DB:-app_db}

  # --- NGINX (Backend Proxy) ---
  webserver:
    container_name: webserver
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/symfony
      - ./nginx-conf:/etc/nginx/conf.d
    depends_on:
      - backend

  # --- DATABASE ---
  database:
    container_name: database
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_pass}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    ports:
      - "5432:5432"

volumes:
  database_data: